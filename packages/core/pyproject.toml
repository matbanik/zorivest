[project]
name = "zorivest-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "apscheduler>=3.11.2",
    "pandera>=0.22",
    "pydantic>=2.0",
    "sqlglot>=26.0",
    "structlog>=25.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zorivest_core"]
