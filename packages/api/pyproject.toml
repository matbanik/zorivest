[project]
name = "zorivest-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "argon2-cffi>=25.1.0",
    "cryptography>=44.0.0",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "psutil>=7.2.2",
    "pydantic>=2.11.0",
    "python-multipart>=0.0.22",
    "uvicorn>=0.34.0",
    "zorivest-core",
    "zorivest-infra",
]

[tool.uv.sources]
zorivest-core = { workspace = true }
zorivest-infra = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zorivest_api"]
