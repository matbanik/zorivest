<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zorivest — Starting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #282a36;
            color: #f8f8f2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 24px;
            -webkit-app-region: drag;
            user-select: none;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #8be9fd;
            letter-spacing: -0.5px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #44475a;
            border-top-color: #8be9fd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status {
            font-size: 14px;
            color: #6272a4;
        }

        .error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .error-message {
            font-size: 14px;
            color: #ff5555;
        }

        .retry-btn {
            -webkit-app-region: no-drag;
            padding: 8px 24px;
            background: #44475a;
            color: #f8f8f2;
            border: 1px solid #6272a4;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .retry-btn:hover {
            background: #6272a4;
        }

        @media (prefers-reduced-motion: reduce) {
            .spinner {
                animation: none;
                border-top-color: #8be9fd;
            }
        }
    </style>
</head>

<body>
    <img src="splash-icon.png" alt="Zorivest" width="80" height="80" style="border-radius: 12px;" />
    <div class="logo">Zorivest</div>
    <div id="loading">
        <div class="spinner"></div>
    </div>
    <div class="status" id="status">Starting backend…</div>
    <div class="error-container" id="error-container">
        <div class="error-message" id="error-message">Backend failed to start.</div>
        <button class="retry-btn" id="retry-btn" onclick="window.location.reload()">Retry</button>
    </div>
</body>

</html>
