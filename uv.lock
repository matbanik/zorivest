    { name = "zorivest-core" },
    { name = "zorivest-infra" },
]

[package.dev-dependencies]
dev = [
    { name = "pyright" },
    { name = "pytest" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "zorivest-core", editable = "packages/core" },
    { name = "zorivest-infra", editable = "packages/infrastructure" },
]

[package.metadata.requires-dev]
dev = [
    { name = "pyright", specifier = ">=1.1.408" },
    { name = "pytest", specifier = ">=9.0.2" },
    { name = "ruff", specifier = ">=0.15.5" },
]

[[package]]
name = "zorivest-core"
version = "0.1.0"
source = { editable = "packages/core" }

[[package]]
name = "zorivest-infra"
version = "0.1.0"
source = { editable = "packages/infrastructure" }
dependencies = [
    { name = "sqlalchemy" },
]

[package.optional-dependencies]
crypto = [
    { name = "argon2-cffi" },
    { name = "sqlcipher3-binary" },
]

[package.metadata]
requires-dist = [
    { name = "argon2-cffi", marker = "extra == 'crypto'", specifier = ">=23.1.0" },
    { name = "sqlalchemy", specifier = ">=2.0.48" },
    { name = "sqlcipher3-binary", marker = "extra == 'crypto'", specifier = ">=0.5.4" },
]
provides-extras = ["crypto"]
